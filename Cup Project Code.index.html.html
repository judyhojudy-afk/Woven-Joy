        body {
            font-family: 'Inter', sans-serif;
            background: #fdfbf7;
            color: #2d3436;
            -webkit-font-smoothing: antialiased;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        html[lang^="zh"] .serif {
            font-family: 'Noto Serif SC', serif;
            font-style: normal;
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border-top-color: #8e735b;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        .joy-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(142, 115, 91, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);

        button:active {

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = (now - start) + ((start.getTimezoneOffset() - now.getTimezoneOffset()) * 60 * 1000);
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        async function fetchDailyVerse() {
            document.getElementById('loading-text').innerText = t.loading;
            document.getElementById('footer-text').innerText = t.footer;
            document.getElementById('copy-btn').innerText = t.copy;
            document.getElementById('prayer-btn').innerText = "✨ " + t.prayerTitle;
            document.getElementById('church-btn').innerText = "✨ " + t.churchTitle;

            const dateDisplay = document.getElementById('date-display');
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateDisplay.innerText = new Date().toLocaleDateString(fullLang, dateOptions);

            const dayOfYear = getDayOfYear();
            // Map the day to the specific index (0-364)
            const reference = verseList[dayOfYear % verseList.length];

            try {
                const response = await fetch(`https://bible-api.com/${encodeURIComponent(reference)}?translation=${t.translation}`);
                const data = await response.json();
                document.getElementById('verse-text').innerText = data.text.trim();
                document.getElementById('verse-ref').innerText = data.reference;
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

            const panel = document.getElementById('insight-panel');
            panel.classList.remove('hidden');
            document.getElementById('panel-title').innerText = type === 'prayer' ? t.prayerTitle : t.churchTitle;
            document.getElementById('panel-body').innerText = type === 'prayer' ? t.prayer : t.church;

        function copyVerse() {
            const text = document.getElementById('verse-text').innerText + " (" + document.getElementById('verse-ref').innerText + ")";
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.getElementById('copy-btn');
            const originalText = t.copy;
            btn.innerText = t.copied;
            setTimeout(() => btn.innerText = originalText, 2000);
        }
